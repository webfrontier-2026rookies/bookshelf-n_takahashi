syntax = "proto3";

package catalog;

service CatalogService {
  rpc ListBooks (ListBooksRequest) returns (ListBooksResponse);
}

//一覧取得の「リクエスト（引数）」の形
message ListBooksRequest {}

//一覧取得の「レスポンス（戻り値）」の形
message ListBooksResponse {
  repeated Book books = 1; //repeatedをつけることで、Book型の配列（リスト）になる
}

//本（1冊分）のデータの形
message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  string createdByUserId = 4;
}
