syntax = "proto3";

package health;

// 疎通確認用の最小サービス。
// 学習者はここに user.proto / catalog.proto を追加し、
// SignUp / Login / RegisterBook / PostReview などを定義していく。
service Health {
  rpc Ping (PingRequest) returns (PingReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string service = 2;
}
